name: Monthly Cat Bath Task Creator

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch: 

jobs:
  create_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Calculate Cat Rotation and Create Issue
        uses: actions/github-script@v6
        with:
          script: |
            // ここから下がJavaScriptのコードです
            const cats = ["ゆきちゃん", "ノブ", "みかちゃん", "まさ"];
            const now = new Date();
            const currentMonth = now.getMonth();
            const year = now.getFullYear();
            const monthDisplay = currentMonth + 1;
            const catIndex = currentMonth % cats.length;
            const targetCat = cats[catIndex];
            const count = Math.floor(currentMonth / cats.length) + 1;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🐱 【猫風呂】${targetCat}（${year}/${monthDisplay}分 / 年${count}回目）`,
              body: `## 実施内容\n- [ ] 爪切り（事前準備）\n- [ ] ブラッシング\n- [ ] 入浴・シャンプー\n- [ ] ドライヤー\n- [ ] ご褒美のおやつ\n\n---\n※4ヶ月に1回の定期メンテナンスです。`,
              labels: ['cat-care']
            });
