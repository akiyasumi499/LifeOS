// 1. 猫の名簿（ローテーション順）
const cats = ["ゆきちゃん", "ノブ", "みかちゃん", "まさ"];

// 2. 現在の月を取得
const now = new Date();
const currentMonth = now.getMonth();
const year = now.getFullYear();
const monthDisplay = currentMonth + 1;

// 3. ローテーション計算
const catIndex = currentMonth % cats.length;
const targetCat = cats[catIndex];

// 4. 何回目の入浴か
const count = Math.floor(currentMonth / cats.length) + 1;

// 5. Issueの作成
await github.rest.issues.create({
  owner: context.repo.owner,
  repo: context.repo.repo,
  title: `🐱 【猫風呂】${targetCat}（${year}/${monthDisplay}分 / 年${count}回目）`,
  body: `## 実施内容\n- [ ] 爪切り\n- [ ] ブラッシング\n- [ ] 入浴・シャンプー\n- [ ] ドライヤー\n- [ ] ご褒美のおやつ\n\n---\n※4ヶ月に1回の定期メンテナンスです。`,
  labels: ['cat-care'] // このラベルをトリガーにボードへ自動追加させます
});
